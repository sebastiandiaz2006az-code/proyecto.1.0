# caballos.html (conectado con `js/caballos.js`)

```html
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Caballos - Imperio Equino</title>

<style>
body {
    font-family: Arial;
    margin: 0;
    background-color: #111;
}

/* NAV */
nav {
    background-color: #3E2723;
    padding: 12px;
    text-align: center;
    position: relative;
    z-index: 10;
}

nav a {
    color: white;
    margin: 15px;
    text-decoration: none;
    font-weight: bold;
}

/* VIDEO */
.video-container {
    position: relative;
    width: 100%;
    height: 85vh;
    overflow: hidden;
}

.video-container video {
    position: absolute;
    top: 50%;
    left: 50%;
    min-width: 100%;
    min-height: 100%;
    transform: translate(-50%, -50%);
    object-fit: cover;
}

/* CAPA OSCURA */
.video-overlay {
    position: absolute;
    width: 100%;
    height: 100%;
    background: linear-gradient(to top, #111 10%, transparent 60%);
}

/* TEXTO */
.video-text {
    position: absolute;
    bottom: 80px;
    left: 50px;
    color: white;
    max-width: 500px;
}

.video-text h1 {
    font-size: 50px;
    margin: 0;
}

.video-text p {
    font-size: 18px;
    margin-top: 10px;
}

/* BOTÓN SONIDO */
.sound-btn {
    position: absolute;
    bottom: 20px;
    right: 20px;
    background: rgba(0,0,0,0.6);
    color: white;
    border: none;
    padding: 10px 14px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 18px;
}

/* CONTENEDOR DE TARJETAS */
.container {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 20px;
    padding: 30px;
    background-color: #f4f4f4;
}

/* TARJETAS */
.card {
    background: white;
    width: 280px;
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0px 5px 15px rgba(0,0,0,0.2);
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.05);
}

.card img {
    width: 100%;
    aspect-ratio: 3/4;
    object-fit: cover;
}

.info {
    padding: 15px;
    text-align: center;
}

.info h3 {
    color: #3E2723;
    margin-top: 0;
}

.boton {
    display: inline-block;
    margin-top: 10px;
    padding: 8px 12px;
    background-color: #6D4C41;
    color: white;
    text-decoration: none;
    border-radius: 5px;
}

.boton:hover {
    background-color: #4E342E;
}

/* VOLVER */
.volver {
    display: block;
    width: fit-content;
    margin: 20px auto;
    padding: 10px 15px;
    background-color: #af634c;
    color: white;
    text-decoration: none;
    border-radius: 5px;
}

.volver:hover {
    background-color: #3E2723;
}
</style>
</head>

<body>

<nav>
    <a href="index.html">Inicio</a>
    <a href="caballos.html">Caballos</a>
    <a href="cuidados.html">Cuidados</a>
    <a href="nosotros.html">Nosotros</a>
</nav>

<!-- VIDEO -->
<div class="video-container">

    <video id="miVideo" autoplay muted loop>
        <source src="imagenes/video-caballos.mp4" type="video/mp4">
    </video>

    <div class="video-overlay"></div>

    <div class="video-text">
        <h1>🐎 Nuestros Caballos</h1>
        <p>Elegancia, fuerza y calidad</p>
    </div>

    <button class="sound-btn" onclick="toggleSound()">🔇</button>

</div>

<!-- CONTENEDOR DINÁMICO -->
<div class="container" id="caballos-container"></div>

<a href="index.html" class="volver">⬅ Volver al inicio</a>

<!-- SCRIPT AUDIO -->
<script>
function toggleSound() {
    const video = document.getElementById("miVideo");
    const btn = document.querySelector(".sound-btn");

    video.muted = !video.muted;
    btn.textContent = video.muted ? "🔇" : "🔊";
}
</script>

<!-- SCRIPT QUE CARGA LOS CABALLOS -->
<script src="js/caballos.js"></script>

</body>
</html>
```
