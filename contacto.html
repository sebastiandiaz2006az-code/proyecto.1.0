<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Contacto - La Manada</title>
    <style>
        body {
            font-family: Arial;
            margin: 0;
            background-color: #f4f4f4;
        }
        header {
            background-color: #4CAF50;
            color: white;
            text-align: center;
            padding: 20px;
        }
        .container {
            padding: 20px;
        }
        .card {
            background: white;
            padding: 20px;
            margin: 20px 0;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
        }
        input, textarea {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }
        button {
            margin-top: 10px;
            padding: 10px;
            width: 100%;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #388E3C;
        }
        .volver {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 15px;
            background-color: #4CAF50;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }
    </style>
</head>

<body>

<header>
    <h1>📞 Contáctanos</h1>
    <p>Estamos para ayudarte 🐾</p>
</header>

<div class="container">

    <div class="card">
        <h2>📱 Información</h2>
        <p>Teléfono: 322-814-6823</p>
        <p>Teléfono: 312-305-7555</p>
        <p>Email: sebastiandiaz2006az@gmail.com</p>
    </div>

    <div class="card">
        <h2>✉️ Envíanos un mensaje</h2>

        <form>
            <input type="text" placeholder="Tu nombre" required>
            <input type="email" placeholder="Tu correo" required>
            <textarea rows="5" placeholder="Escribe tu mensaje..." required></textarea>
            <button type="submit">Enviar</button>
        </form>
    </div>

    <a href="index.html" class="volver">⬅ Volver al inicio</a>

</div>

</body>
</html>
