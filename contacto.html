<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Contacto - Criadero Equino</title>

<style>
 body {
    font-family: Arial, sans-serif;
    margin: 0;

    background-image: url("imagenes/contactos.avif");
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
}

/* NAV */
nav {
    background: white;
    padding: 15px;
    text-align: center;
    border-bottom: 1px solid #ddd;
}

nav a {
    margin: 10px;
    text-decoration: none;
    color: #333;
    font-weight: 500;
}

nav a:hover {
    color: #0071e3;
}

/* HERO */
.hero {
    text-align: center;
    padding: 60px 20px 30px;
}

.hero h1 {
    font-size: 40px;
    margin-bottom: 10px;
}

.hero p {
    color: #555;
    font-size: 18px;
}

/* CONTENEDOR */
.container {
    display: flex;
    justify-content: center;
    padding: 20px;
}

/* CARD */
.card {
    background: white;
    padding: 30px;
    border-radius: 20px;
    width: 350px;
    box-shadow: 0px 10px 30px rgba(0,0,0,0.1);
    animation: aparecer 1s ease;
}

/* INPUTS */
input, textarea {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 10px;
    border: 1px solid #ccc;
    font-size: 14px;
}

input:focus, textarea:focus {
    outline: none;
    border-color: #0071e3;
}

/* BOTON */
button {
    width: 100%;
    padding: 12px;
    background: #0071e3;
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #005bb5;
}

/* INFO */
.info {
    text-align: center;
    margin-top: 20px;
    color: #555;
}

.info p {
    margin: 5px 0;
}

/* ANIMACION */
@keyframes aparecer {
    from {
        opacity: 0;
        transform: translateY(30px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}
</style>
</head>

<body>

<nav>
    <a href="index.html">Inicio</a>
    <a href="caballos.html">Caballos</a>
    <a href="cuidados.html">Cuidados</a>
    <a href="nosotros.html">Nosotros</a>
    <a href="contacto.html">Contacto</a>
</nav>

<div class="hero">
    <h1>📞 Contáctanos</h1>
    <p>Estamos listos para ayudarte a encontrar tu caballo ideal</p>
</div>

<div class="container">

    <div class="card">

        <form>
            <input type="text" placeholder="Nombre" required>
            <input type="email" placeholder="Correo electrónico" required>
            <input type="text" placeholder="Teléfono">
            <textarea rows="4" placeholder="Escribe tu mensaje..."></textarea>

            <button type="submit">Enviar mensaje</button>
        </form>

        <div class="info">
            <p>📱 322-814-6823</p>
            <p>📱 312-305-7555</p>
            <p>📧 sebastiandiaz2006az@gmail.com</p>
        </div>

    </div>

</div>

</body>
</html>
